version: "3.8"
services:
  mongodb:
    image: mongo:latest
    container_name: campuspro-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build: ./server
    container_name: campuspro-server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/campuspro
      - PORT=5000
    depends_on:
      - mongodb
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mongodb_data:
